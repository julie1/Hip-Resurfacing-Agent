name: Debug Pinecone

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Install Playwright browsers
        run: playwright install chromium
      
      - name: Run debug
        env:
          # add whatever secrets/env vars the script needs
        run: python incremental_pinecone_ingestion.py --debug 2>&1 | tee pinecone_update.log
      
      - name: Upload debug HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-html
          path: |
            debug_forum_index.html
            pinecone_update.log
